server {
    listen 80;
    server_name _;

    # Docker internal resolver for lazy DNS — prevents crash when backend/frontend restart.
    resolver 127.0.0.11 valid=5s;
    set $backend  http://backend:8080;
    set $frontend http://frontend:3000;

    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin;

    location /api/ {
        proxy_pass         $backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # AI endpoints: n8n call (≤60s) + one fallback call must fit
        proxy_read_timeout 150s;
    }

    location /health { proxy_pass $backend; }
    location /ready  { proxy_pass $backend; }

    location / {
        proxy_pass       $frontend;
        proxy_set_header Host $host;
    }
}
