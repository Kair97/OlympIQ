server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal resolver — enables lazy DNS so nginx starts even if
    # backend isn't ready yet (avoids "host not found" crash on startup).
    resolver 127.0.0.11 valid=5s;
    set $backend http://backend:8080;

    location /api/ {
        proxy_pass         $backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        # AI endpoints can take 60s+ (n8n call with cold start, plus one
        # fallback retry) — must exceed the backend's worst-case total.
        proxy_read_timeout 150s;
    }

    location /health {
        proxy_pass $backend;
    }

    location /ready {
        proxy_pass $backend;
    }

    # Serve the React SPA for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
